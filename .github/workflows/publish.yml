name: Publish Package

# tag 驱动: 打 tag `@wuyaos/<pkg>@<version>` 触发对应包发布
# 例: git tag '@wuyaos/pi-cc-tui@1.0.0' && git push --tags
#
# 使用 npm Trusted Publishing (OIDC), 无需 NPM_TOKEN。
# 前提: 每个包首次发布需手动 npm publish 一次, 然后在 npmjs.com 包设置页
# 配置 Trusted Publisher (GitHub Actions):
#   - Organization or user: wuyaos
#   - Repository: pi-packages
#   - Workflow filename: publish.yml
#   - Allowed actions: npm publish

on:
  push:
    tags:
      - '@wuyaos/*@*'

permissions:
  id-token: write  # OIDC trusted publishing 必需
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        # tag 格式: @wuyaos/<pkg>@<version>
        # GITHUB_REF=refs/tags/@wuyaos/pi-cc-tui@1.0.0
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          # 拆分最后一个 @: pkg=@wuyaos/pi-cc-tui, version=1.0.0
          pkg="${ref%@*}"
          version="${ref##*@}"
          echo "pkg=$pkg"
          echo "version=$version"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        run: |
          pkg="${{ steps.tag.outputs.pkg }}"
          version="${{ steps.tag.outputs.version }}"
          actual=$(npm pkg get version --workspace "$pkg" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(Object.values(JSON.parse(d))[0]))")
          echo "Expected: $version  Actual: $actual"
          if [ "$version" != "$actual" ]; then
            echo "::error::Tag version $version does not match package.json version $actual"
            exit 1
          fi

      - name: Publish
        run: npm publish --workspace "${{ steps.tag.outputs.pkg }}"
