name: Publish Packages

# 打总 tag 触发, workflow 内串行发布所有"版本号比 npm 上新"的包
# 触发 tag: release* 或 publish-all*  (例: git tag publish-all && git push --tags)
#
# 每个包自动判断:
# - npm 上不存在        → 首次发布, 需 NPM_TOKEN secret
#                         (发完去 npm 配 Trusted Publisher, 之后可删 token)
# - npm 上存在但版本不同 → OIDC Trusted Publishing (无需 token)
# - 版本相同            → 跳过
#
# 因此也能只发单个包: 只改一个包的 version + 打总 tag, 其余包版本不变会跳过

on:
  push:
    tags:
      - 'release*'
      - 'publish-all*'

permissions:
  id-token: write   # OIDC trusted publishing 必需
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish changed packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          # 列出所有 pi-* workspace 包: name<TAB>version
          mapfile -t pkgs < <(node -e '
            const fs = require("fs");
            for (const d of fs.readdirSync(".")) {
              if (!d.startsWith("pi-")) continue;
              const f = d + "/package.json";
              if (!fs.existsSync(f)) continue;
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              if (p.private) continue;
              console.log(p.name + "\t" + p.version);
            }
          ')

          for line in "${pkgs[@]}"; do
            IFS=$'\t' read -r name version <<< "$line"
            echo ""
            echo "=== $name @ $version ==="

            # 1. 该版本是否已发布? → 跳过
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "  $name@$version already on npm, skip"
              continue
            fi

            # 2. 包是否已存在? 决定首次(token) vs OIDC
            if npm view "$name" version >/dev/null 2>&1; then
              echo "  Package exists, publishing $version via OIDC"
              npm publish --workspace "$name" --access public
            else
              if [ -z "$NPM_TOKEN" ]; then
                echo "::error::$name does not exist on npm; first publish requires NPM_TOKEN secret"
                exit 1
              fi
              echo "  First publish of $name, using NPM_TOKEN"
              NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --workspace "$name" --access public
              echo "::notice::$name first-published. Configure Trusted Publisher on npm, then remove NPM_TOKEN secret."
            fi
          done

          echo ""
          echo "=== Done ==="
