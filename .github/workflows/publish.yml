name: Publish Packages

# 打总 tag 触发, workflow 内串行发布所有"版本号比 npm 上新"的包
# 触发 tag: release* 或 publish-all*  (例: git tag publish-all && git push --tags)
#
# 每个包自动判断:
# - npm 上不存在        → 首次发布, 需 NPM_TOKEN secret
#                         (发完去 npm 配 Trusted Publisher, 之后可删 token)
# - npm 上存在但版本不同 → OIDC Trusted Publishing (无需 token)
# - 版本相同            → 跳过
#
# 因此也能只发单个包: 只改一个包的 version + 打总 tag, 其余包版本不变会跳过

on:
  push:
    tags:
      - 'release*'
      - 'publish-all*'

permissions:
  id-token: write   # OIDC trusted publishing 必需
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish changed packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          # 列出所有 pi-* workspace 包: name<TAB>version
          mapfile -t pkgs < <(node -e '
            const fs = require("fs");
            for (const d of fs.readdirSync(".")) {
              if (!d.startsWith("pi-")) continue;
              const f = d + "/package.json";
              if (!fs.existsSync(f)) continue;
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              if (p.private) continue;
              console.log(p.name + "\t" + p.version);
            }
          ')

          # 带重试的发布: 处理 OIDC provenance 的 tlog 409 等偶发错误
          # npm publish 非幂等, 但 tlog 失败时包可能已上传成功 → 重试前先查版本
          publish_pkg() {
            local name="$1" version="$2" max_attempts=3 attempt=1
            while :; do
              # 重试前检查: 上次可能已上传成功 (仅 tlog/签名步骤失败)
              if npm view "$name@$version" version >/dev/null 2>&1; then
                echo "  $name@$version already on npm, treating as success"
                return 0
              fi
              echo "  Publish attempt $attempt/$max_attempts..."
              local log rc
              log=$(npm publish --workspace "$name" --access public 2>&1)
              rc=$?
              echo "$log" | sed 's/^/    /'
              [ $rc -eq 0 ] && return 0
              # 仅对偶发错误重试 (tlog 冲突 / 网络抖动)
              if [ "$attempt" -lt "$max_attempts" ] && echo "$log" | grep -qE "TLOG_CREATE_ENTRY_ERROR|ETIMEDOUT|ECONNRESET|EAI_AGAIN|409"; then
                attempt=$((attempt + 1))
                echo "  Retriable error, retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
                continue
              fi
              return $rc
            done
          }

          for line in "${pkgs[@]}"; do
            IFS=$'\t' read -r name version <<< "$line"
            echo ""
            echo "=== $name @ $version ==="

            # 1. 该版本是否已发布? → 跳过
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "  $name@$version already on npm, skip"
              continue
            fi

            # 2. 包是否已存在? 决定首次(token) vs OIDC
            if npm view "$name" version >/dev/null 2>&1; then
              echo "  Package exists, publishing $version via OIDC"
              publish_pkg "$name" "$version"
            else
              if [ -z "$NPM_TOKEN" ]; then
                echo "::error::$name does not exist on npm; first publish requires NPM_TOKEN secret"
                exit 1
              fi
              echo "  First publish of $name, using NPM_TOKEN"
              NODE_AUTH_TOKEN="$NPM_TOKEN" publish_pkg "$name" "$version"
              echo "::notice::$name first-published. Configure Trusted Publisher on npm, then remove NPM_TOKEN secret."
            fi
          done

          echo ""
          echo "=== Done ==="
