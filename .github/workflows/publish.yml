name: Publish Package

# tag 驱动: 打 tag `@wuyaos/<pkg>@<version>` 触发对应包发布
# 例: git tag '@wuyaos/pi-cc-tui@1.0.0' && git push --tags
#
# 双模式发布:
# - 有 NPM_TOKEN secret → 用它发布(用于首次发布,包尚不存在时)
# - 无 NPM_TOKEN secret → 用 OIDC Trusted Publishing(包已存在且配好 trusted publisher 后)
#
# 首次发布流程:
#   1. 生成 npm token, 加到 GitHub Secrets: NPM_TOKEN
#   2. 打 tag 推送, Action 用 token 发首次, 包创建到 npm
#   3. 去 npmjs.com 该包 Settings → Trusted publishing, 配 GitHub Actions:
#        Organization or user: wuyaos, Repository: pi-packages,
#        Workflow filename: publish.yml, Allowed actions: npm publish
#   4. 删除 GitHub 的 NPM_TOKEN secret
#   5. 之后打 tag 即由 OIDC 自动发布, 无需任何 token

on:
  push:
    tags:
      - '@wuyaos/*@*'

permissions:
  id-token: write  # OIDC trusted publishing 必需
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        # tag 格式: @wuyaos/<pkg>@<version>
        # GITHUB_REF=refs/tags/@wuyaos/pi-cc-tui@1.0.0
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          # 拆分最后一个 @: pkg=@wuyaos/pi-cc-tui, version=1.0.0
          pkg="${ref%@*}"
          version="${ref##*@}"
          echo "pkg=$pkg"
          echo "version=$version"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        run: |
          pkg="${{ steps.tag.outputs.pkg }}"
          version="${{ steps.tag.outputs.version }}"
          actual=$(npm pkg get version --workspace "$pkg" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(Object.values(JSON.parse(d))[0]))")
          echo "Expected: $version  Actual: $actual"
          if [ "$version" != "$actual" ]; then
            echo "::error::Tag version $version does not match package.json version $actual"
            exit 1
          fi

      - name: Check if package already exists on npm
        id: exists
        run: |
          pkg="${{ steps.tag.outputs.pkg }}"
          if npm view "$pkg" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package $pkg already exists on npm"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package $pkg does not exist yet (first publish)"
          fi

      - name: Publish (OIDC, package already exists)
        if: steps.exists.outputs.exists == 'true'
        run: npm publish --workspace "${{ steps.tag.outputs.pkg }}"

      - name: Publish (NPM_TOKEN, first publish)
        if: steps.exists.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::First publish of ${{ steps.tag.outputs.pkg }} requires NPM_TOKEN secret (package does not exist on npm yet). Add NPM_TOKEN to GitHub Secrets, or publish manually first, then configure Trusted Publisher and remove the token."
            exit 1
          fi
          echo "::notice::First publish using NPM_TOKEN. After this succeeds, configure Trusted Publisher on npm and remove the NPM_TOKEN secret."
          npm publish --workspace "${{ steps.tag.outputs.pkg }}"
